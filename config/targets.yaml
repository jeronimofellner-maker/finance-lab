# =============================================================================
# ASIGNACIÓN TARGET — propuesta inicial (2026-06-11). Editable.
# Los pesos son sobre el valor total de la cartera en USD-MEP y suman 1.00.
# El rebalanceo compara la foto actual contra esto y sugiere órdenes.
# =============================================================================

# Banda de tolerancia: no sugerir rebalanceo si el drift es menor a esto (en pp).
rebalance_band_pp: 5.0

# Targets por clase de activo (deben sumar 1.0)
by_asset_class:
  cedear:      0.30   # equity global USD diversificado
  us_equity:   0.20   # LATAM/US-listed con upside (MELI, GLOB, VIST)
  accion_ar:   0.15   # equity Argentina BYMA (GGAL, PAMP, YPF)
  bono_ar:     0.15   # soberanos hard-dollar (GD/AL)
  ons:         0.10   # ONs corporativas USD (clave 'ons', no 'on': YAML lee 'on' como booleano)
  cash:        0.05   # liquidez USD-MEP
  plazo_fijo:  0.05   # pesos a tasa, táctico

# Reglas de riesgo (de tu perfil)
risk:
  max_weight_per_position: 0.15   # 15% máximo por nombre individual
  max_drawdown_tolerance: 0.25
  horizon_years: 5
  no_derivatives: true

# Benchmark para performance attribution (medido en USD-CCL)
benchmark:
  components:
    - { symbol: "^GSPC", weight: 0.60, label: "S&P 500" }
    - { symbol: "MERVAL_CCL", weight: 0.40, label: "Merval en USD-CCL" }
